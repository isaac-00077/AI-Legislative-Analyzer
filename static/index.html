<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legislative AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="top-header">
        <h1><span>Legislative AI</span></h1>
      </header>

      <section class="carousel-area" aria-live="polite">
        <button
          type="button"
          class="nav-arrow left"
          id="prev-bill-btn"
          aria-label="Previous bill"
        >
          <span>&larr;</span>
        </button>

        <div class="slider-viewport" id="slider-viewport">
          <article class="bill-slide" id="bill-slide">
            <div class="bill-head">
              <div class="bill-counter" id="bill-counter">0 bills loaded</div>
              <h2 id="bill-title">Loading bills...</h2>
            </div>

            <section class="summary-grid" id="summary-grid">
              <article class="summary-card">
                <div class="card-icon">🎯</div>
                <h3>Purpose</h3>
                <div id="purpose-text" class="summary-content">Waiting for bill data...</div>
                <button type="button" class="view-more-btn" data-section="purpose">View More</button>
              </article>

              <article class="summary-card">
                <div class="card-icon">🧩</div>
                <h3>Key Points</h3>
                <div id="keypoints-text" class="summary-content">Waiting for bill data...</div>
                <button type="button" class="view-more-btn" data-section="keyPoints">View More</button>
              </article>

              <article class="summary-card">
                <div class="card-icon">📊</div>
                <h3>Impact</h3>
                <div id="impact-text" class="summary-content">Waiting for bill data...</div>
                <button type="button" class="view-more-btn" data-section="impact">View More</button>
              </article>
            </section>

            <div class="bill-footer">
              <a
                id="open-pdf-btn"
                class="open-pdf-btn"
                href="#"
                target="_blank"
                rel="noreferrer"
              >
                📄 Open Full PDF
              </a>
            </div>
          </article>
        </div>

        <button
          type="button"
          class="nav-arrow right"
          id="next-bill-btn"
          aria-label="Next bill"
        >
          <span>&rarr;</span>
        </button>
      </section>
    </main>

    <div class="details-backdrop" id="details-backdrop" aria-hidden="true"></div>

    <section class="details-modal" id="details-modal" aria-hidden="true" role="dialog" aria-modal="true">
      <header class="details-header">
        <h3 id="details-title">Details</h3>
        <button type="button" id="details-close" class="details-close" aria-label="Close details">✕</button>
      </header>
      <div class="details-body" id="details-body"></div>
    </section>

    <div class="chat-launch-wrap">
      <button id="chat-toggle" class="chat-toggle" type="button" aria-label="Open chatbot">
        💬 Ask about this bill
      </button>
    </div>

    <div class="chat-backdrop" id="chat-backdrop" aria-hidden="true"></div>

    <section class="chat-panel" id="chat-panel" aria-hidden="true">
      <header class="chat-header">
        <h3>AI Bill Assistant</h3>
        <button id="chat-close" class="chat-close" type="button" aria-label="Close chatbot">✕</button>
      </header>

      <div class="chat-messages" id="chat-messages">
        <div class="chat-message bot">Ask any question about any bill in the system.</div>
      </div>

      <form class="chat-input-row" id="chat-form">
        <input
          id="chat-input"
          type="text"
          placeholder="Type your question..."
          autocomplete="off"
          required
        />
        <button id="chat-send" type="submit">Send</button>
      </form>
    </section>

    <script src="/static/script.js"></script>
  </body>
</html>
